<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO QUEST ― 王国の物流エンジニア ―</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9RTQCP2HXM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-9RTQCP2HXM');
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell side-collapsed" id="app-shell">
  <header class="game-header">
    <div class="brand">
      <div class="brand-title">ALGO QUEST</div>
      <div class="brand-sub">― 王国の物流エンジニア ―</div>
    </div>
    <div class="head-progress-wrap">
      <div class="head-progress-label" id="progress-label">クリア 0 / 6</div>
      <div class="head-progress"><div class="head-progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="header-actions">
      <a id="home-link" href="https://ruglerugle.github.io/" title="クエスト集トップへ" aria-label="クエスト集トップへ">🧭</a>
      <button id="head-nav-toggle" class="head-btn" title="ステージ一覧の表示切替">☰ ナビ</button>
    </div>
  </header>

  <div class="game-layout">
    <div class="side-backdrop" id="side-backdrop"></div>
    <aside class="side-panel" id="stage-sidebar">
      <div class="side-head">
        <button class="side-toggle" id="sidebar-toggle" title="ステージ一覧の表示切替" aria-label="ステージ一覧の表示切替">☰</button>
        <span class="side-head-text">ステージ一覧</span>
      </div>
      <nav id="stage-nav" class="step-list"></nav>
    </aside>

    <main class="main-area" id="main-area">
      <div id="dialogue-panel"></div>

      <div id="mission-banner">
        <div id="mission-title"></div>
        <div id="mission-text"></div>
        <div id="mission-status"></div>
      </div>

      <section id="stage-area">
        <div id="visual-wrap">
          <div id="visual-stage"></div>
        </div>
        <div id="stage-actions"></div>
      </section>

      <div id="status-box">
        <h3>装備中アルゴリズム</h3>
        <div id="status-content"><p class="hint">ステージを開始すると表示されます</p></div>
      </div>
      <div id="compare-box"></div>

      <footer id="control-bar">
        <button id="btn-play" title="自動再生">▶ 再生</button>
        <button id="btn-pause" title="一時停止">⏸ 一時停止</button>
        <button id="btn-step-anim" title="1ステップ進める">1ステップ</button>
        <label class="speed-label">速度
          <input type="range" id="speed-slider" min="0.5" max="3" step="0.5" value="1">
        </label>
        <button id="btn-reset" title="ステージをやり直す">↺ ステージリセット</button>
      </footer>

      <div id="log-panel">
        <h3>冒険の記録</h3>
        <ul id="log-list"></ul>
      </div>

      <div id="book-recommend"></div>
    </main>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
